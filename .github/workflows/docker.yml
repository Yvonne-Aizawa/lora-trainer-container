name: Build and Push Docker Image

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Convert username to lowercase (FIXES YOUR ERROR)
      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${OWNER_LC}/lumina-lora:latest \
            -t ghcr.io/${OWNER_LC}/lumina-lora:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${OWNER_LC}/lumina-lora:latest
          docker push ghcr.io/${OWNER_LC}/lumina-lora:${{ github.sha }}
